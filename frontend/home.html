<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>展厅 · 世界古典美术拟生平台 · Living Classical Art</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .lang-toggle { position: fixed; top: 18px; right: 22px; z-index: 10; }
    .home-footer a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(43, 38, 32, 0.4); }
    .home-footer a:hover { color: var(--cinnabar); border-bottom-color: var(--cinnabar); }
    .home-footer .welcome { display: block; margin-top: 8px; font-size: 13px; color: var(--ink-soft); }

    /* 画卡：场景实拍封面 + hover 微起 */
    .painting-card figure { position: relative; overflow: hidden; }
    .painting-card img { transition: transform 0.6s ease; }
    .painting-card:hover img { transform: scale(1.04); }
    .painting-card .agents {
      position: absolute; left: 10px; bottom: 8px;
      font-size: 12px; letter-spacing: 0.18em; color: #fff;
      text-shadow: 0 1px 6px rgba(20, 16, 10, 0.8);
    }

    /* 物种实验室 · 环形光点导航（悬停闪烁） */
    .idea-orb {
      --orb: 64px;
      position: relative; display: flex; flex-direction: column; align-items: center;
      gap: 10px; margin: 6px auto 0; width: var(--orb);
      text-decoration: none; color: var(--ink-soft);
    }
    .idea-orb .orb-ring, .idea-orb .orb-core { border-radius: 50%; box-sizing: border-box; }
    .idea-orb .orb-ring {
      width: var(--orb); height: var(--orb);
      border: 1.5px solid rgba(210, 120, 60, 0.55);
      box-shadow: 0 0 18px rgba(210, 120, 60, 0.25) inset, 0 0 14px rgba(210, 120, 60, 0.2);
      animation: orbPulse 3.2s ease-in-out infinite;
    }
    .idea-orb .orb-core {
      position: absolute; top: calc(var(--orb) / 2 - 7px);
      width: 14px; height: 14px;
      background: radial-gradient(circle at 35% 30%, #ffd9a8, var(--cinnabar) 70%);
      box-shadow: 0 0 12px rgba(210, 90, 40, 0.7);
      animation: orbBreathe 2.4s ease-in-out infinite;
    }
    .idea-orb .orb-label { font-size: 13px; letter-spacing: 0.14em; opacity: 0.7; transition: opacity 0.25s, color 0.25s; }
    .idea-orb:hover .orb-ring {
      border-color: rgba(210, 90, 40, 0.95);
      box-shadow: 0 0 30px rgba(210, 90, 40, 0.55) inset, 0 0 26px rgba(210, 90, 40, 0.5);
      animation: orbFlicker 0.5s ease-in-out infinite;
    }
    .idea-orb:hover .orb-core { animation: orbFlicker 0.5s ease-in-out infinite; box-shadow: 0 0 20px rgba(255, 150, 80, 0.95); }
    .idea-orb:hover .orb-label { opacity: 1; color: var(--cinnabar); }
    @keyframes orbPulse { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.08); opacity: 1; } }
    @keyframes orbBreathe { 0%, 100% { transform: scale(0.85); opacity: 0.75; } 50% { transform: scale(1.15); opacity: 1; } }
    @keyframes orbFlicker {
      0%, 100% { opacity: 1; transform: scale(1.05); } 25% { opacity: 0.55; transform: scale(0.92); }
      50% { opacity: 0.95; transform: scale(1.12); } 75% { opacity: 0.6; transform: scale(0.96); }
    }
    @media (prefers-reduced-motion: reduce) {
      .idea-orb .orb-ring, .idea-orb .orb-core,
      .idea-orb:hover .orb-ring, .idea-orb:hover .orb-core { animation: none; }
    }
  </style>
</head>
<body class="home-page">
  <button class="preset lang-toggle" id="lang-toggle" type="button" aria-label="Switch language">EN</button>

  <header class="home-header">
    <h1 data-i18n="title">世界古典美术拟生平台</h1>
    <p data-i18n="subtitle">画中生物皆为自主智能体 —— 感知 · 行为 · 运动，古画活过来了</p>
  </header>

  <main class="gallery">
    <a class="painting-card" href="tiger.html">
      <figure>
        <img src="assets/gallery/tiger-scene.jpg" alt="竹虎溪涧图 · 实时场景" />
        <span class="agents" data-i18n="tigerAgents">虎 · 雪兔 · 锦鸡 · 竹林 · 雨雪</span>
      </figure>
      <div class="card-caption">
        <h2 data-i18n="tigerTitle">竹虎溪涧图</h2>
        <p data-i18n="tigerDesc">雪竹 · 斑斓虎 · 雪兔 · 锦鸡 —— 狩野山乐《竹虎图》之威仪，雪舟《四季花鸟图》溪涧为境</p>
        <span class="enter" data-i18n="enter">入 画</span>
      </div>
    </a>

    <a class="painting-card" href="plum.html">
      <figure>
        <img src="assets/gallery/plum-scene.jpg" alt="寒梅归雁图 · 实时场景" />
        <span class="agents" data-i18n="plumAgents">古梅 · 归雁 · 静水塘 · 远山 · 薄雪</span>
      </figure>
      <div class="card-caption">
        <h2 data-i18n="plumTitle">寒梅归雁图</h2>
        <p data-i18n="plumDesc">古梅 · 修竹 · 水塘 · 归雁 —— 寒枝繁花，汀雁栖飞，远山如黛</p>
        <span class="enter" data-i18n="enter">入 画</span>
      </div>
    </a>
  </main>

  <!-- 物种实验室：环形光点导航，悬停闪烁 -->
  <a class="idea-orb" href="lab.html" aria-label="物种实验室">
    <span class="orb-ring"></span>
    <span class="orb-core"></span>
    <span class="orb-label" data-i18n="labTitle">物种实验室</span>
  </a>

  <footer class="home-footer">
    <span data-i18n="footer">拟生 · Artificial Life —— Tu &amp; Terzopoulos《Artificial Fishes》遗法</span>
    <span class="welcome">
      <span data-i18n="welcome">开源共建：欢迎来修改、提 Issue、参与讨论</span>
      · <a href="https://github.com/panglaohupanglaohu/TigerInBamboo" target="_blank" rel="noopener">GitHub</a>
    </span>
  </footer>

  <script>
    // 展厅双语：默认随浏览器语言，手动切换并记忆
    const I18N = {
      zh: {
        title: "世界古典美术拟生平台",
        subtitle: "画中生物皆为自主智能体 —— 感知 · 行为 · 运动，古画活过来了",
        tigerTitle: "竹虎溪涧图",
        tigerDesc: "雪竹 · 斑斓虎 · 雪兔 · 锦鸡 —— 狩野山乐《竹虎图》之威仪，雪舟《四季花鸟图》溪涧为境",
        tigerAgents: "虎 · 雪兔 · 锦鸡 · 竹林 · 雨雪",
        plumTitle: "寒梅归雁图",
        plumDesc: "古梅 · 修竹 · 水塘 · 归雁 —— 寒枝繁花，汀雁栖飞，远山如黛",
        plumAgents: "古梅 · 归雁 · 静水塘 · 远山 · 薄雪",
        enter: "入 画",
        labTitle: "物种实验室",
        footer: "拟生 · Artificial Life —— Tu & Terzopoulos《Artificial Fishes》遗法",
        welcome: "开源共建：欢迎来修改、提 Issue、参与讨论",
      },
      en: {
        title: "Living Classical Art",
        subtitle: "Every creature is an autonomous agent — perception · behavior · locomotion — classical paintings come alive",
        tigerTitle: "Tiger by the Bamboo Stream",
        tigerDesc: "Snow bamboo · tiger · snow hare · golden pheasant — after Kanō Sanraku's “Tiger in Bamboo”, set in a stream scene from Sesshū",
        tigerAgents: "Tiger · snow hare · pheasant · bamboo · rain & snow",
        plumTitle: "Returning Geese by the Wintry Plum",
        plumDesc: "Ancient plum · slender bamboo · still pond · returning geese — blossoms on cold branches, geese above ink-blue hills",
        plumAgents: "Plum · geese · pond · distant hills · light snow",
        enter: "Enter",
        labTitle: "Species Lab",
        footer: "Artificial Life — after Tu & Terzopoulos' “Artificial Fishes”",
        welcome: "Open source — contributions, issues and discussions are welcome",
      },
    };
    const KEY = "ui.lang";
    const btn = document.getElementById("lang-toggle");
    let lang;
    try { lang = localStorage.getItem(KEY); } catch (_) { lang = null; }
    if (!lang) lang = (navigator.language || "zh").toLowerCase().startsWith("zh") ? "zh" : "en";
    function applyLang() {
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const t = I18N[lang][el.dataset.i18n];
        if (t) el.textContent = t;
      });
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      btn.textContent = lang === "zh" ? "EN" : "中文";
    }
    btn.addEventListener("click", () => {
      lang = lang === "zh" ? "en" : "zh";
      try { localStorage.setItem(KEY, lang); } catch (_) { /* 忽略 */ }
      applyLang();
    });
    applyLang();
  </script>
</body>
</html>
