<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>系统配置 · 世界古典美术拟生平台</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="config-page">
    <div class="config-header">
      <h1>拟生平台 · 系统配置</h1>
      <a href="home.html">← 返回《竹虎溪涧图》</a>
    </div>
    <p class="config-sub">
      智能体行为参数与物种关系配置。物种关系参考 Tu &amp; Terzopoulos《Artificial Fishes》的
      感知—内驱力—行为模型；修改保存后刷新场景页生效。
      《寒梅归雁图》另有独立配置页：<a href="plum-config.html">寒梅归雁 · 系统配置</a>。
    </p>

    <div class="config-tabs">
      <button type="button" class="active" data-tab="creatures">生 物</button>
      <button type="button" data-tab="env">环境配置</button>
      <button type="button" data-tab="relations">物种关系</button>
      <button type="button" data-tab="av">视 听</button>
    </div>

    <form id="config-form" onsubmit="return false;">
      <div class="config-tabpane active" id="tab-creatures">
        <fieldset>
          <legend>猛 虎</legend>
          <div class="field">
            <label>巡游速度</label>
            <input type="range" id="tiger.speed" min="0.2" max="2.5" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>巡游范围</label>
            <input type="range" id="tiger.patrolRadius" min="0.6" max="1.6" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>斑纹对比度</label>
            <input type="range" id="tiger.stripeContrast" min="0.2" max="1.5" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>皮毛长度</label>
            <input type="range" id="tiger.furLength" min="0" max="2" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>皮毛层数</label>
            <input type="range" id="tiger.furLayers" min="2" max="24" step="1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>驻足间隔（秒，均值）</label>
            <input type="range" id="tiger.pauseInterval" min="4" max="40" step="1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>驻足时长（秒）</label>
            <input type="range" id="tiger.pauseDuration" min="0.5" max="8" step="0.1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>尾巴缠竹竿</label>
            <input type="checkbox" id="tiger.tailCurl" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>缠竹触发距离（米）</label>
            <input type="range" id="tiger.tailCurlDistance" min="0.5" max="3.5" step="0.05" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>雪 兔</legend>
          <div class="field">
            <label>启用雪兔</label>
            <input type="checkbox" id="rabbit.enabled" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>蹦跳速度</label>
            <input type="range" id="rabbit.speed" min="0.2" max="1.5" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>环游半径（米）</label>
            <input type="range" id="rabbit.roamRadius" min="2" max="12" step="0.5" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>锦 鸡</legend>
          <div class="field">
            <label>启用锦鸡</label>
            <input type="checkbox" id="pheasant.enabled" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>警戒距离（惊飞）</label>
            <input type="range" id="pheasant.fleeDistance" min="2" max="15" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>归返距离（虎远）</label>
            <input type="range" id="pheasant.returnDistance" min="6" max="25" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>饮水间隔（秒）</label>
            <input type="range" id="pheasant.drinkInterval" min="8" max="60" step="1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>避险停留（秒）</label>
            <input type="range" id="pheasant.perchTime" min="1" max="15" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>锦鸡数量</label>
            <input type="range" id="pheasant.count" min="0" max="6" step="1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>警觉距离（冻结观察）</label>
            <input type="range" id="pheasant.alertDistance" min="4" max="20" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>奔逃时长（秒）</label>
            <input type="range" id="pheasant.runDuration" min="0.3" max="3" step="0.1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>重生延时（秒）</label>
            <input type="range" id="pheasant.respawnDelay" min="5" max="60" step="1" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>捕 食（音乐触发）</legend>
          <div class="field">
            <label>启用捕食</label>
            <input type="checkbox" id="hunt.enabled" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>触发曲目（文件名含子串）</label>
            <input type="text" id="hunt.musicTrigger" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>潜行发现距离（米）</label>
            <input type="range" id="hunt.stalkDistance" min="4" max="45" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>潜行速度倍率</label>
            <input type="range" id="hunt.stalkSpeed" min="0.2" max="1" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>爆发距离（米，起冲刺）</label>
            <input type="range" id="hunt.sprintDistance" min="4" max="30" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>冲刺速度倍率</label>
            <input type="range" id="hunt.sprintSpeed" min="1" max="4" step="0.1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>飞扑距离（米，起跳）</label>
            <input type="range" id="hunt.pounceDistance" min="2" max="14" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>进食时长（秒）</label>
            <input type="range" id="hunt.feedDuration" min="2" max="15" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>捕食间隔（秒）</label>
            <input type="range" id="hunt.cooldown" min="4" max="60" step="1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>虎啸音效音量</label>
            <input type="range" id="hunt.sfxVolume" min="0" max="1" step="0.05" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>母 女 对 话</legend>
          <div class="field">
            <label>启用对话</label>
            <input type="checkbox" id="dialog.enabled" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>触发间隔（秒）</label>
            <input type="range" id="dialog.interval" min="8" max="60" step="1" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>女 儿 · 虎（语音与模型）</legend>
          <div class="field">
            <label>嗓音</label>
            <input type="text" id="dialog.daughter.voiceName" placeholder="auto（自动选中文女声）" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>语速</label>
            <input type="range" id="dialog.daughter.voiceRate" min="0.5" max="1.8" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>音高</label>
            <input type="range" id="dialog.daughter.voicePitch" min="0.5" max="2.0" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>音量</label>
            <input type="range" id="dialog.daughter.voiceVolume" min="0" max="1" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>大模型接口</label>
            <input type="text" id="dialog.daughter.llmEndpoint" placeholder="留空则使用内置问安脚本" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>API Key</label>
            <input type="password" id="dialog.daughter.llmApiKey" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>模型名</label>
            <input type="text" id="dialog.daughter.llmModel" placeholder="如 gpt-4o-mini" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>母 亲 · 兔（语音与模型）</legend>
          <div class="field">
            <label>嗓音</label>
            <input type="text" id="dialog.mother.voiceName" placeholder="auto（自动选中文女声）" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>语速</label>
            <input type="range" id="dialog.mother.voiceRate" min="0.5" max="1.8" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>音高</label>
            <input type="range" id="dialog.mother.voicePitch" min="0.5" max="2.0" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>音量</label>
            <input type="range" id="dialog.mother.voiceVolume" min="0" max="1" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>大模型接口</label>
            <input type="text" id="dialog.mother.llmEndpoint" placeholder="留空则使用内置应答脚本" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>API Key</label>
            <input type="password" id="dialog.mother.llmApiKey" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>模型名</label>
            <input type="text" id="dialog.mother.llmModel" placeholder="如 gpt-4o-mini" />
            <span class="value"></span>
          </div>
        </fieldset>
      </div>

      <div class="config-tabpane" id="tab-env">
        <fieldset>
          <legend>场 景</legend>
          <div class="field">
            <label>竹林密度（株）</label>
            <input type="range" id="scene.bambooCount" min="20" max="180" step="5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>雾气浓度</label>
            <input type="range" id="scene.mist" min="0" max="1" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>金笺纸底色</label>
            <input type="checkbox" id="scene.goldBackground" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>天 气</legend>
          <div class="field">
            <label>温度（℃，&gt;0 下雨 / ≤0 下雪）</label>
            <input type="range" id="weather.temperature" min="-15" max="20" step="0.5" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>降水强度</label>
            <input type="range" id="weather.snowfall" min="0" max="2" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>风力</label>
            <input type="range" id="weather.wind" min="0" max="1" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>风向（度，0=北 90=东）</label>
            <input type="range" id="weather.windDirection" min="0" max="360" step="5" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>竹 林</legend>
          <div class="field">
            <label>回正刚度（被虎撞弯后）</label>
            <input type="range" id="bamboo.stiffness" min="1" max="8" step="0.1" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>风摆幅度</label>
            <input type="range" id="bamboo.sway" min="0" max="2" step="0.05" />
            <span class="value"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>物 理</legend>
          <div class="field">
            <label>重力加速度（m/s²）</label>
            <input type="range" id="physics.gravity" min="-20" max="-1" step="0.01" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>求解迭代次数</label>
            <input type="range" id="physics.solverIterations" min="2" max="16" step="1" />
            <span class="value"></span>
          </div>
        </fieldset>
      </div>

      <div class="config-tabpane" id="tab-relations">
        <fieldset>
          <legend>物 种 关 系</legend>
          <table class="relations">
            <thead>
              <tr><th>主体</th><th>客体</th><th>关系</th><th>内驱力</th><th>强度</th><th>说明</th></tr>
            </thead>
            <tbody id="relations-body"></tbody>
          </table>
        </fieldset>
      </div>

      <div class="config-tabpane" id="tab-av">
        <fieldset>
          <legend>视 觉 与 音 乐</legend>
          <div class="field">
            <label>初始机位</label>
            <select id="style.cameraPreset">
              <option value="panorama">全景（屏风正面）</option>
              <option value="follow">随虎（斜后上方）</option>
              <option value="stream">溪涧（低机位顺水）</option>
            </select>
            <span class="value"></span>
          </div>
          <div class="field">
            <label>水墨勾线（预留）</label>
            <input type="checkbox" id="style.inkOutline" />
            <span class="value"></span>
          </div>
          <div class="field">
            <label>背景音乐音量</label>
            <input type="range" id="bgm.volume" min="0" max="1" step="0.05" />
            <span class="value"></span>
          </div>
          <div class="field" style="align-items:flex-start">
            <label>背景音乐歌单</label>
            <div id="playlist-editor" style="flex:1"></div>
          </div>
        </fieldset>
      </div>

      <div class="config-actions">
        <button class="btn" id="save-btn">保 存</button>
        <button class="btn ghost" id="reset-btn">恢复默认</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { loadConfig, saveConfig, resetConfig, DEFAULT_CONFIG } from "js/config.js";

    const RELATION_TYPES = ["predator-prey", "physical", "resource", "mutualism", "competition"];
    const DRIVES = ["fear", "hunger", "thirst", "libido", "none"];

    let config = await loadConfig();

    // ---- 标量字段绑定 ----
    const fields = document.querySelectorAll("[id]");
    function getPath(obj, path) {
      return path.split(".").reduce((o, k) => o?.[k], obj);
    }
    function setPath(obj, path, value) {
      const keys = path.split(".");
      const last = keys.pop();
      const target = keys.reduce((o, k) => (o[k] ??= {}), obj);
      target[last] = value;
    }
    function refreshFields() {
      document.querySelectorAll("input[id], select[id]").forEach((el) => {
        if (el.closest("#relations-body")) return;
        const v = getPath(config, el.id);
        if (v === undefined) return;
        if (el.type === "checkbox") el.checked = !!v;
        else el.value = v;
        const span = el.parentElement.querySelector(".value");
        if (span && el.type === "range") span.textContent = Number(v).toFixed(2).replace(/\.?0+$/, "");
        if (span && el.type === "checkbox") span.textContent = v ? "启" : "闭";
      });
    }
    document.querySelectorAll("input[id], select[id]").forEach((el) => {
      if (el.closest("#relations-body")) return;
      el.addEventListener("input", () => {
        let v;
        if (el.type === "checkbox") v = el.checked;
        else if (el.type === "range" || el.type === "number") v = Number(el.value);
        else v = el.value;
        setPath(config, el.id, v);
        refreshFields();
      });
    });

    // ---- Tab 切换 ----
    document.querySelectorAll(".config-tabs button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".config-tabs button").forEach((b) =>
          b.classList.toggle("active", b === btn));
        document.querySelectorAll(".config-tabpane").forEach((pane) =>
          pane.classList.toggle("active", pane.id === "tab-" + btn.dataset.tab));
      });
    });

    // ---- 物种关系表 ----
    function renderRelations() {
      const body = document.getElementById("relations-body");
      body.innerHTML = "";
      config.ecology.relations.forEach((rel, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${rel.a}</td><td>${rel.b}</td>
          <td><select data-i="${i}" data-k="type">
            ${RELATION_TYPES.map((t) => `<option ${t === rel.type ? "selected" : ""}>${t}</option>`).join("")}
          </select></td>
          <td><select data-i="${i}" data-k="drive">
            ${DRIVES.map((d) => `<option ${d === rel.drive ? "selected" : ""}>${d}</option>`).join("")}
          </select></td>
          <td><input type="number" min="0" max="1" step="0.05" value="${rel.strength}" data-i="${i}" data-k="strength" /></td>
          <td>${rel.note ?? ""}</td>`;
        body.appendChild(tr);
      });
      body.querySelectorAll("select, input").forEach((el) => {
        el.addEventListener("input", () => {
          const rel = config.ecology.relations[Number(el.dataset.i)];
          rel[el.dataset.k] = el.type === "number" ? Number(el.value) : el.value;
        });
      });
    }

    // ---- 背景音乐歌单编辑 ----
    let audioLib = [];
    try {
      const r = await fetch("/api/audio");
      if (r.ok) audioLib = (await r.json()).files ?? [];
    } catch (_) { /* 离线时曲库不可达，仅可删不可加 */ }

    function renderPlaylist() {
      const box = document.getElementById("playlist-editor");
      box.innerHTML = "";
      config.bgm.playlist ??= [];
      config.bgm.playlist.forEach((p, i) => {
        const row = document.createElement("div");
        row.style.cssText = "display:flex;gap:6px;align-items:center;margin:3px 0";
        row.innerHTML = `
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                title="${p}">${i + 1}. ${p.split("/").pop()}</span>
          <button type="button" class="btn ghost" data-i="${i}" data-act="up" style="padding:2px 8px">↑</button>
          <button type="button" class="btn ghost" data-i="${i}" data-act="down" style="padding:2px 8px">↓</button>
          <button type="button" class="btn ghost" data-i="${i}" data-act="del" style="padding:2px 8px">删</button>`;
        box.appendChild(row);
      });
      const rest = audioLib.filter((f) => !config.bgm.playlist.includes(f));
      const addRow = document.createElement("div");
      addRow.style.cssText = "display:flex;gap:6px;align-items:center;margin-top:6px";
      addRow.innerHTML = rest.length
        ? `<select id="playlist-add-sel" style="flex:1">${rest.map((f) => `<option value="${f}">${f.split("/").pop()}</option>`).join("")}</select>
           <button type="button" class="btn ghost" id="playlist-add-btn" style="padding:2px 10px">添加</button>`
        : `<span style="opacity:0.55;font-size:13px">${audioLib.length ? "曲库已全部入单" : "曲库不可达（需后端）"}</span>`;
      box.appendChild(addRow);
      box.querySelectorAll("button[data-act]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.i), act = btn.dataset.act, list = config.bgm.playlist;
          if (act === "del") list.splice(i, 1);
          else if (act === "up" && i > 0) [list[i - 1], list[i]] = [list[i], list[i - 1]];
          else if (act === "down" && i < list.length - 1) [list[i + 1], list[i]] = [list[i], list[i + 1]];
          renderPlaylist();
        });
      });
      document.getElementById("playlist-add-btn")?.addEventListener("click", () => {
        const sel = document.getElementById("playlist-add-sel");
        if (sel?.value) { config.bgm.playlist.push(sel.value); renderPlaylist(); }
      });
    }

    // ---- 保存 / 重置 ----
    const toast = (msg) => {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2200);
    };
    document.getElementById("save-btn").addEventListener("click", async () => {
      const ok = await saveConfig(config);
      toast(ok ? "已封存 · 刷新场景页生效" : "保存失败");
    });
    document.getElementById("reset-btn").addEventListener("click", async () => {
      config = await resetConfig();
      refreshFields();
      renderRelations();
      renderPlaylist();
      toast("已恢复默认");
    });

    refreshFields();
    renderRelations();
    renderPlaylist();
  </script>
</body>
</html>
