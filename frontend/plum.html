<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寒梅归雁图 · 世界古典美术拟生平台</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "cannon-es": "/assets/vendor/cannon-es.js"
    }
  }
  </script>
</head>
<body class="scene-page">
  <canvas id="stage"></canvas>

  <!-- 画题 · 竖排，仿屏风落款 -->
  <header class="vertical-title">
    <h1>寒梅归雁图</h1>
    <p>古梅 · 水塘 · 归雁</p>
  </header>

  <!-- 视角与入口（推拉收合：滑出画外仅留竖柄） -->
  <nav class="hud collapsible" id="hud">
    <button class="panel-handle" type="button" data-target="hud" aria-label="收起/展开">视角</button>
    <div class="hud-group" id="camera-presets">
      <span class="hud-label">视角</span>
      <button data-preset="panorama" class="preset active">全景</button>
      <button data-preset="plum" class="preset">梅下</button>
      <button data-preset="pond" class="preset">塘雁</button>
      <button data-preset="flight" class="preset">归飞</button>
      <button data-preset="mountains" class="preset">远山</button>
    </div>
    <div class="hud-group">
      <button id="bgm-toggle" class="preset">♪ 静音</button>
      <a class="preset link" href="/">展厅</a>
      <a class="preset link" href="/plum-config.html" target="_blank">系统配置</a>
    </div>
  </nav>

  <!-- 智能体状态（感知 → 行为 可视化，推拉收合） -->
  <aside class="agent-panel collapsible" id="agent-panel">
    <button class="panel-handle" type="button" data-target="agent-panel" aria-label="收起/展开">生灵</button>
    <div class="agent" id="agent-goose">
      <span class="dot goose"></span>归雁 · <em id="goose-state">盘旋</em>
    </div>
    <div class="agent" id="agent-plum">
      <span class="dot" style="background:#e9a9a2"></span>古梅 · <em>盛开</em>
    </div>
    <div class="agent" id="agent-weather">
      <span class="dot" style="background:#f2efe6;border:1px solid #57503f"></span>天气 · <em id="weather-state">薄雪</em>
    </div>
  </aside>

  <div class="vignette"></div>
  <div id="loading">铺 纸 研 墨 …</div>

  <script type="module" src="/js/plum-main.js"></script>
</body>
</html>
